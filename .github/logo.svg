<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#4C1D95" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tickGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="520" height="160" rx="16" fill="url(#bg)"/>

  <!-- Subtle glow behind dial -->
  <circle cx="80" cy="80" r="70" fill="url(#glow)"/>

  <!-- Outer ring — vault dial style -->
  <circle cx="80" cy="80" r="52" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="80" cy="80" r="44" stroke="#A78BFA" stroke-width="0.5" fill="none" opacity="0.2"/>

  <!-- Tick marks around the dial (vault/safe style) -->
  <g stroke="#A78BFA" stroke-width="1" opacity="0.4">
    <!-- Major ticks every 30 degrees -->
    <line x1="80" y1="30" x2="80" y2="36"/>
    <line x1="106" y1="35" x2="103" y2="40.2"/>
    <line x1="124" y1="54" x2="119.8" y2="57"/>
    <line x1="130" y1="80" x2="124" y2="80"/>
    <line x1="124" y1="106" x2="119.8" y2="103"/>
    <line x1="106" y1="125" x2="103" y2="119.8"/>
    <line x1="80" y1="130" x2="80" y2="124"/>
    <line x1="54" y1="125" x2="57" y2="119.8"/>
    <line x1="36" y1="106" x2="40.2" y2="103"/>
    <line x1="30" y1="80" x2="36" y2="80"/>
    <line x1="36" y1="54" x2="40.2" y2="57"/>
    <line x1="54" y1="35" x2="57" y2="40.2"/>
  </g>

  <!-- Minor tick marks -->
  <g stroke="#A78BFA" stroke-width="0.5" opacity="0.2">
    <line x1="93" y1="30.5" x2="92" y2="35"/>
    <line x1="67" y1="30.5" x2="68" y2="35"/>
    <line x1="117" y1="41" x2="114" y2="45"/>
    <line x1="119" y1="67" x2="114" y2="68"/>
    <line x1="119" y1="93" x2="114" y2="92"/>
    <line x1="117" y1="119" x2="114" y2="115"/>
    <line x1="93" y1="129.5" x2="92" y2="125"/>
    <line x1="67" y1="129.5" x2="68" y2="125"/>
    <line x1="43" y1="119" x2="46" y2="115"/>
    <line x1="41" y1="93" x2="46" y2="92"/>
    <line x1="41" y1="67" x2="46" y2="68"/>
    <line x1="43" y1="41" x2="46" y2="45"/>
  </g>

  <!-- Shield in the center -->
  <path d="M80 50 L100 58 L100 78 C100 94 92 104 80 110 C68 104 60 94 60 78 L60 58 Z"
        fill="url(#shieldFill)" stroke="#A78BFA" stroke-width="1" opacity="0.9"/>

  <!-- Lock keyhole in shield -->
  <circle cx="80" cy="76" r="4" fill="#C4B5FD"/>
  <rect x="78" y="79" width="4" height="8" rx="1" fill="#C4B5FD"/>

  <!-- Dial pointer (top) -->
  <polygon points="80,24 77,30 83,30" fill="#A78BFA" opacity="0.8"/>

  <!-- Text: PRISMA -->
  <text x="155" y="68" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="32" font-weight="300" fill="#94A3B8" letter-spacing="4">PRISMA</text>

  <!-- Text: SHIELD -->
  <text x="155" y="108" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="38" font-weight="700" fill="#E2E8F0" letter-spacing="3">SHIELD</text>

  <!-- Subtle decorative line -->
  <line x1="155" y1="76" x2="340" y2="76" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>

  <!-- Small dots accent -->
  <circle cx="355" cy="62" r="1.5" fill="#A78BFA" opacity="0.3"/>
  <circle cx="365" cy="68" r="1" fill="#6D28D9" opacity="0.25"/>
  <circle cx="358" cy="100" r="1" fill="#4F46E5" opacity="0.2"/>
</svg>
