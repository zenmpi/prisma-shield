<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="20%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#08080f"/>
    </radialGradient>
    <radialGradient id="glowMain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED" stop-opacity="0.12"/>
      <stop offset="100%" style="stop-color:#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="shieldF" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#4C1D95" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Subtle purple ambient on right -->
    <radialGradient id="ambientR" cx="90%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#6D28D9" stop-opacity="0.08"/>
      <stop offset="100%" style="stop-color:#6D28D9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>
  <rect width="800" height="200" rx="12" fill="url(#ambientR)"/>

  <!-- Glow behind dial -->
  <circle cx="100" cy="100" r="85" fill="url(#glowMain)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="62" stroke="url(#ringG)" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="100" cy="100" r="54" stroke="#A78BFA" stroke-width="0.5" fill="none" opacity="0.15"/>

  <!-- Tick marks -->
  <g stroke="#A78BFA" stroke-width="1" opacity="0.35">
    <line x1="100" y1="40" x2="100" y2="47"/>
    <line x1="131" y1="46" x2="128" y2="52"/>
    <line x1="154" y1="69" x2="148" y2="72"/>
    <line x1="160" y1="100" x2="153" y2="100"/>
    <line x1="154" y1="131" x2="148" y2="128"/>
    <line x1="131" y1="154" x2="128" y2="148"/>
    <line x1="100" y1="160" x2="100" y2="153"/>
    <line x1="69" y1="154" x2="72" y2="148"/>
    <line x1="46" y1="131" x2="52" y2="128"/>
    <line x1="40" y1="100" x2="47" y2="100"/>
    <line x1="46" y1="69" x2="52" y2="72"/>
    <line x1="69" y1="46" x2="72" y2="52"/>
  </g>

  <!-- Minor ticks -->
  <g stroke="#A78BFA" stroke-width="0.5" opacity="0.15">
    <line x1="116" y1="40.5" x2="114" y2="46"/>
    <line x1="84" y1="40.5" x2="86" y2="46"/>
    <line x1="145" y1="55" x2="141" y2="59"/>
    <line x1="147" y1="84" x2="141" y2="86"/>
    <line x1="147" y1="116" x2="141" y2="114"/>
    <line x1="145" y1="145" x2="141" y2="141"/>
    <line x1="116" y1="159.5" x2="114" y2="154"/>
    <line x1="84" y1="159.5" x2="86" y2="154"/>
    <line x1="55" y1="145" x2="59" y2="141"/>
    <line x1="53" y1="116" x2="59" y2="114"/>
    <line x1="53" y1="84" x2="59" y2="86"/>
    <line x1="55" y1="55" x2="59" y2="59"/>
  </g>

  <!-- Shield -->
  <path d="M100 62 L124 72 L124 96 C124 116 114 128 100 135 C86 128 76 116 76 96 L76 72 Z"
        fill="url(#shieldF)" stroke="#A78BFA" stroke-width="1" opacity="0.9"/>

  <!-- Lock keyhole -->
  <circle cx="100" cy="94" r="5" fill="#C4B5FD"/>
  <rect x="97.5" y="98" width="5" height="10" rx="1.5" fill="#C4B5FD"/>

  <!-- Pointer -->
  <polygon points="100,32 96,40 104,40" fill="#A78BFA" opacity="0.7"/>

  <!-- Text -->
  <text x="200" y="85" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="40" font-weight="300" fill="#94A3B8" letter-spacing="5">PRISMA</text>
  <text x="200" y="135" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="48" font-weight="700" fill="#E2E8F0" letter-spacing="4">SHIELD</text>

  <!-- Divider -->
  <line x1="200" y1="95" x2="460" y2="95" stroke="#A78BFA" stroke-width="0.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="200" y="165" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748B" letter-spacing="2">ENCRYPTION  ·  RLS  ·  AUDIT  ·  MASKING</text>
</svg>
